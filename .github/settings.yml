repository:
  name: go-service-template-pro
  description: Production-ready Go microservice template with operations control panel
  default_branch: main
  has_issues: true
  has_projects: true
  has_wiki: false

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
      required_status_checks:
        strict: true
        contexts:
          - backend-lint-test-build
          - frontend-lint-build
          - docker-build
      enforce_admins: true
      required_linear_history: true
      restrictions: null

labels:
  - name: type/feature
    color: 0E8A16
  - name: type/bug
    color: D73A4A
  - name: type/docs
    color: 1D76DB
  - name: type/ci
    color: 5319E7
  - name: type/refactor
    color: FBCA04
  - name: priority/p0
    color: B60205
  - name: priority/p1
    color: D93F0B
  - name: priority/p2
    color: FBCA04
  - name: area/api
    color: 0E8A16
  - name: area/ops-panel
    color: 0052CC
  - name: area/telemetry
    color: 5319E7
  - name: area/infra
    color: F9D0C4
  - name: risk:low
    color: C2E0C6
  - name: risk:medium
    color: FBCA04
  - name: risk:high
    color: D73A4A
