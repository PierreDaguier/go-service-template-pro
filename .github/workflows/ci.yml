name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  backend-lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
      - name: Download modules
        run: go mod download
      - name: Check gofmt
        run: |
          fmt_files="$(find cmd internal -name '*.go' -print0 | xargs -0 -r gofmt -l)"
          if [ -n "$fmt_files" ]; then
            echo "$fmt_files"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./cmd/service
      - name: Install GolangCI-Lint (Go 1.26 build)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.6.2
      - name: GolangCI-Lint
        run: "$(go env GOPATH)/bin/golangci-lint" run ./...

  frontend-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build backend image
        run: docker build -t go-service-template-pro:ci .
      - name: Build frontend image
        run: docker build -t go-service-template-pro-ui:ci ./web
