server:
  http_listen_port: 3200

receivers:
  otlp:
    protocols:
      grpc:
      http:

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces

compactor:
  compaction:
    compacted_block_retention: 24h

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
